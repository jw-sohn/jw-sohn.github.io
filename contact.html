<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0, minimum-scale=1.0">
    <title>Contact - Jiwoong Sohn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <!-- Calendly link widget begin -->
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
    <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
    <!-- Calendly link widget end -->
    <style>
      html, body {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      body {
        font-family: 'Plus Jakarta Sans', 'Inter', 'Roboto', 'Segoe UI', 'Helvetica Neue', Arial, 'Liberation Sans', 'Nimbus Sans', 'system-ui', sans-serif;
        letter-spacing: 0.015em;
        font-variation-settings: 'wght' 450;
        font-smooth: always;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0 auto;
        padding: 15px;
        max-width: 700px;
        line-height: 1.4;
        box-sizing: border-box;
      }
      
      .name {
        text-align: center;
        font-size: 1.2em;
        font-weight: 700;
        margin: 25px 0;
        letter-spacing: 0.03em;
      }
      
      .section {
        margin-bottom: 30px;
      }
      
      .section h2 {
        font-size: 0.85em;
        font-weight: 700;
        color: #000;
        margin: 20px 0 12px 0;
        letter-spacing: 0.02em;
      }
      
      .contact-item {
        margin-bottom: 15px;
      }
      
      .contact-item p {
        margin: 3px 0;
        color: #666;
        font-size: 0.75em;
        letter-spacing: 0.015em;
      }
      
      .contact-item a {
        color: #666;
        text-decoration: none;
        transition: color 0.2s;
      }
      
      .contact-item a:hover {
        color: #000;
      }

      /* Menu Button */
      .menu-button {
        position: fixed;
        top: 15px;
        left: 0;
        background: #666;
        color: white;
        border: none;
        padding: 8px 12px;
        font-size: 14px;
        cursor: pointer;
        z-index: 1001;
        transition: background 0.3s;
        font-family: inherit;
        letter-spacing: 0.015em;
        text-transform: uppercase;
      }

      .menu-button:hover {
        background: #888;
      }

      .menu-button.hidden {
        display: none;
      }

      /* Sidebar */
      .sidebar {
        position: fixed;
        top: 0;
        left: -280px;
        width: 280px;
        height: 100vh;
        background: white;
        box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        transition: left 0.3s;
        z-index: 1000;
        overflow-y: auto;
        padding: 15px;
        box-sizing: border-box;
        font-family: inherit;
      }

      .sidebar.open {
        left: 0;
      }

      .close-button {
        position: absolute;
        top: 15px;
        right: 15px;
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: #666;
        font-family: inherit;
      }

      .close-button:hover {
        color: #000;
      }

      .sidebar-section {
        margin-bottom: 25px;
      }

      .section-title {
        font-size: 1.1em;
        font-weight: 700;
        margin-bottom: 15px;
        color: #000;
        letter-spacing: 0.02em;
      }

      .section-content a {
        display: block;
        padding: 8px 0;
        color: #666;
        text-decoration: none;
        border-bottom: 1px solid #f0f0f0;
        transition: background 0.2s;
        font-size: 0.85em;
        font-family: inherit;
        letter-spacing: 0.015em;
      }

      .section-content a:hover {
        background: #f8f8f8;
        color: #000;
      }

      /* Overlay */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 999;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s, visibility 0.3s;
      }

      .overlay.open {
        opacity: 1;
        visibility: visible;
      }

      /* Responsive adjustments for mobile */
      @media (max-width: 600px) {
        body {
          padding-left: 4px !important;
          padding-right: 4px !important;
          width: 100vw;
          box-sizing: border-box;
          max-width: 100vw;
        }
      }
    </style>
</head>
<body>
    <!-- Menu Button -->
    <button class="menu-button hidden" onclick="toggleMenu()">☰</button>

    <!-- Overlay -->
    <div class="overlay" onclick="closeMenu()"></div>

    <!-- Sidebar -->
    <div class="sidebar open">
        <button class="close-button" onclick="closeMenu()">×</button>
        <div class="sidebar-section">
            <div class="section-title">JIWOONG's</div>
            <div class="section-content">
                <a href="index.html">HOME</a>
                <a href="research.html">RESEARCH</a>
                <a href="education.html">EDUCATION</a>
                <a href="publications.html">PUBLICATIONS</a>
                <a href="awards.html">AWARDS</a>
                <a href="talks.html">TALKS</a>
                <a href="teaching.html">TEACHING</a>
                <a href="contact.html">CONTACT</a>
                <a href="misc.html">MISC</a>
            </div>
        </div>
    </div>

    <div class="name">CONTACT</div>
    <div class="section">
        <br>
        <p style="font-size: 0.9em;">I'm always happy to connect and discuss about research.<br>Feel free to reach out via <a href="mailto:jisohn@ethz.ch">email</a> or <a href="" onclick="Calendly.initPopupWidget({url: 'https://calendly.com/sohnji12/30min'});return false;">schedule a zoom</a>!</p>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.overlay');
            const menuButton = document.querySelector('.menu-button');
            
            if (sidebar.classList.contains('open')) {
                closeMenu();
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('open');
                menuButton.classList.add('hidden');
            }
        }

        function closeMenu() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.overlay');
            const menuButton = document.querySelector('.menu-button');
            
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
            
            // Show menu button after sidebar animation completes (300ms)
            setTimeout(() => {
                menuButton.classList.remove('hidden');
            }, 300);
        }

        // Close menu with Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeMenu();
            }
        });
    </script>
</body>
</html>
