<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0, minimum-scale=1.0">
    <title>Workout Manager - Jiwoong Sohn</title>
    <link rel="icon" type="image/png" href="/data/favicon-jw-sohn.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
      html, body {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      body {
        font-family: 'Plus Jakarta Sans', 'Inter', 'Roboto', 'Segoe UI', 'Helvetica Neue', Arial, 'Liberation Sans', 'Nimbus Sans', 'system-ui', sans-serif;
        letter-spacing: 0.015em;
        font-variation-settings: 'wght' 450;
        font-smooth: always;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0 auto;
        padding: 15px;
        max-width: 1000px;
        line-height: 1.4;
        box-sizing: border-box;
        background: #ffffff;
      }
      
      .header {
        text-align: center;
        margin: 20px 0 40px 0;
        background: #000000;
        padding: 30px;
        border-radius: 0;
        border: none;
      }
      
      .title {
        font-size: 1.8em;
        font-weight: 700;
        margin-bottom: 10px;
        color: #ffffff;
      }
      
      .subtitle {
        font-size: 1em;
        color: #b0b0b0;
        margin-bottom: 20px;
      }
      
      .back-btn {
        display: inline-block;
        padding: 8px 16px;
        background: #ffffff;
        color: #000000;
        text-decoration: none;
        border-radius: 0;
        font-size: 0.9em;
        transition: all 0.2s;
        border: 1px solid #ffffff;
      }
      
      .back-btn:hover {
        background: #000000;
        color: #ffffff;
      }
      
      .workout-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      
      .day-card {
        background: #fafafa;
        border-radius: 0;
        padding: 20px;
        box-shadow: none;
        border: 1px solid #e0e0e0;
        border-left: 3px solid #000000;
      }
      
      .day-card.today {
        border-left: 5px solid #d32f2f;
        background: #ffffff;
        border-color: #e0e0e0;
        border-left-color: #d32f2f;
      }
      
      .day-title {
        font-size: 1.2em;
        font-weight: 700;
        color: #000000;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      
      .day-title-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      
      .day-history-btn {
        background: #000000;
        color: #ffffff;
        border: 1px solid #000000;
        padding: 4px 10px;
        border-radius: 0;
        font-size: 0.75em;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      
      .day-history-btn:hover {
        background: #ffffff;
        color: #000000;
      }
      
      .day-focus {
        font-size: 0.9em;
        color: #666666;
        margin-bottom: 15px;
        font-style: italic;
      }
      
      .exercise-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      
      .exercise-item {
        background: #ffffff;
        margin-bottom: 10px;
        padding: 15px;
        border-radius: 0;
        border: 1px solid #d0d0d0;
      }
      
      .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
      }
      
      .exercise-name {
        font-weight: 600;
        color: #000000;
        font-size: 0.95em;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 0;
        transition: background 0.2s;
        flex: 1;
      }
      
      .exercise-name:hover {
        background: #f0f0f0;
      }
      
      .exercise-name-input {
        font-weight: 600;
        color: #000000;
        font-size: 0.95em;
        border: 1px solid #000000;
        background: white;
        padding: 4px 8px;
        border-radius: 0;
        width: 100%;
        box-sizing: border-box;
      }
      
      .exercise-name-input:focus {
        outline: none;
        border-color: #000000;
      }
      
      .history-btn {
        background: #666666;
        color: white;
        border: 1px solid #666666;
        padding: 4px 10px;
        border-radius: 0;
        font-size: 0.75em;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      
      .history-btn:hover {
        background: #000000;
        border-color: #000000;
      }
      
      .exercise-details {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 8px;
      }
      
      .detail-group {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      
      .detail-label {
        font-size: 0.7em;
        color: #666;
        margin-bottom: 2px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      
      .detail-input {
        width: 100%;
        max-width: 70px;
        padding: 4px 8px;
        border: 1px solid #c0c0c0;
        border-radius: 0;
        text-align: center;
        font-size: 0.9em;
        background: white;
        box-sizing: border-box;
      }
      
      .detail-input:focus {
        outline: none;
        border-color: #000000;
        box-shadow: none;
      }
      
      .exercise-effect {
        font-size: 0.8em;
        color: #808080;
        font-style: italic;
        margin-top: 5px;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 0;
        transition: background 0.2s;
      }
      
      .exercise-effect:hover {
        background: #f5f5f5;
      }
      
      .exercise-effect-input {
        font-size: 0.8em;
        color: #808080;
        font-style: italic;
        border: 1px solid #c0c0c0;
        background: white;
        padding: 2px 4px;
        border-radius: 0;
        width: 100%;
        box-sizing: border-box;
      }
      
      .exercise-effect-input:focus {
        outline: none;
        border-color: #000000;
      }
      
      .exercise-controls {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-top: 10px;
      }
      
      .control-btn {
        background: none;
        border: 1px solid transparent;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 0;
        font-size: 0.8em;
        transition: all 0.2s;
      }
      
      .complete-btn {
        color: #000000;
        font-weight: 600;
        border-color: #d0d0d0;
      }
      
      .complete-btn:hover {
        background: #000000;
        color: #ffffff;
        border-color: #000000;
      }
      
      .delete-btn {
        color: #666666;
        border-color: #d0d0d0;
      }
      
      .delete-btn:hover {
        background: #666666;
        color: #ffffff;
        border-color: #666666;
      }
      
      .add-exercise-btn {
        background: #000000;
        color: white;
        border: 1px solid #000000;
        padding: 8px 16px;
        border-radius: 0;
        font-size: 0.9em;
        cursor: pointer;
        margin-top: 15px;
        width: 100%;
        transition: all 0.2s;
      }
      
      .add-exercise-btn:hover {
        background: #ffffff;
        color: #000000;
      }
      
      .save-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #000000;
        color: white;
        border: 2px solid #000000;
        padding: 15px 20px;
        border-radius: 0;
        font-size: 1em;
        font-weight: 600;
        cursor: pointer;
        box-shadow: none;
        transition: all 0.2s;
        z-index: 100;
      }
      
      .save-btn:hover {
        background: #ffffff;
        color: #000000;
        transform: none;
        box-shadow: none;
      }
      
      .sync-btn {
        position: fixed;
        bottom: 80px;
        right: 20px;
        background: #ffffff;
        color: #000000;
        border: 2px solid #000000;
        padding: 12px 18px;
        border-radius: 0;
        font-size: 0.9em;
        font-weight: 600;
        cursor: pointer;
        box-shadow: none;
        transition: all 0.2s;
        z-index: 100;
      }
      
      .sync-btn:hover {
        background: #000000;
        color: #ffffff;
        transform: none;
        box-shadow: none;
      }
      
      .sync-btn.syncing {
        background: #cccccc;
        color: #666666;
        border-color: #cccccc;
        cursor: not-allowed;
      }
      
      .settings-btn {
        position: fixed;
        bottom: 140px;
        right: 20px;
        background: #666666;
        color: white;
        border: 2px solid #666666;
        padding: 10px;
        border-radius: 0;
        width: 45px;
        height: 45px;
        font-size: 1.2em;
        cursor: pointer;
        box-shadow: none;
        transition: all 0.2s;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .settings-btn:hover {
        background: #000000;
        border-color: #000000;
        transform: none;
        box-shadow: none;
      }
      
      .token-input-group {
        margin: 20px 0;
      }
      
      .token-input {
        width: 100%;
        padding: 10px;
        border: 1px solid #c0c0c0;
        border-radius: 0;
        font-size: 0.9em;
        box-sizing: border-box;
        font-family: 'Courier New', monospace;
      }
      
      .token-input:focus {
        outline: none;
        border-color: #000000;
        box-shadow: none;
      }
      
      .token-label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #000000;
        font-size: 0.9em;
      }
      
      .token-hint {
        font-size: 0.8em;
        color: #808080;
        margin-top: 5px;
      }
      
      .token-hint a {
        color: #000000;
        text-decoration: underline;
      }
      
      .token-hint a:hover {
        color: #666666;
      }
      
      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }
      
      .btn {
        flex: 1;
        padding: 10px 20px;
        border: 1px solid #000000;
        border-radius: 0;
        font-size: 0.9em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      
      .btn-primary {
        background: #000000;
        color: white;
      }
      
      .btn-primary:hover {
        background: #ffffff;
        color: #000000;
      }
      
      .btn-secondary {
        background: #ffffff;
        color: #000000;
        border-color: #666666;
      }
      
      .btn-secondary:hover {
        background: #666666;
        color: #ffffff;
        border-color: #666666;
      }
      
      .sync-status {
        text-align: center;
        padding: 10px;
        margin: 10px 0;
        border-radius: 0;
        font-size: 0.85em;
        border: 1px solid;
      }
      
      .sync-status.success {
        background: #f5f5f5;
        color: #000000;
        border-color: #000000;
      }
      
      .sync-status.error {
        background: #f5f5f5;
        color: #666666;
        border-color: #666666;
      }
      
      .sync-status.info {
        background: #f5f5f5;
        color: #000000;
        border-color: #c0c0c0;
      }
      
      .today-indicator {
        background: #000000;
        color: white;
        padding: 2px 8px;
        border-radius: 0;
        font-size: 0.7em;
        font-weight: 600;
      }
      
      /* Modal styles */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.85);
        overflow-y: auto;
      }
      
      .modal.show {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 0;
        width: 90%;
        max-width: 800px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: none;
        border: 2px solid #000000;
      }
      
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid #000000;
      }
      
      .modal-title {
        font-size: 1.4em;
        font-weight: 700;
        color: #000000;
      }
      
      .close-btn {
        background: none;
        border: 1px solid #c0c0c0;
        font-size: 1.8em;
        cursor: pointer;
        color: #000000;
        line-height: 1;
        padding: 0;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 0;
        transition: all 0.2s;
      }
      
      .close-btn:hover {
        background: #000000;
        color: #ffffff;
        border-color: #000000;
      }
      
      .chart-container {
        margin: 20px 0;
        padding: 20px;
        background: #fafafa;
        border-radius: 0;
      }
      
      .chart-section {
        margin-bottom: 30px;
      }
      
      .chart-section-title {
        font-size: 1.1em;
        font-weight: 600;
        color: #000000;
        margin-bottom: 15px;
      }
      
      .bar-chart {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        height: 600px;
        padding: 10px;
        padding-top: 40px;
        background: white;
        border-radius: 0;
        border: 1px solid #d0d0d0;
      }
      
      .bar-stack {
        transition: all 0.3s;
      }
      
      .bar-stack:hover {
        opacity: 0.8;
      }
      
      .bar-group {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100%;
        gap: 5px;
      }
      
      .bar {
        width: 100%;
        background: #333333;
        border-radius: 0;
        transition: all 0.3s;
        position: relative;
      }
      
      .bar:hover {
        background: #000000;
      }
      
      .bar-label {
        font-size: 0.75em;
        color: #000000;
        font-weight: 600;
        text-align: center;
      }
      
      .bar-value {
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.75em;
        font-weight: 600;
        color: #000000;
        white-space: nowrap;
      }
      
      .bar-date {
        font-size: 0.7em;
        color: #666666;
        text-align: center;
        margin-top: 5px;
      }
      
      .no-history {
        text-align: center;
        padding: 40px;
        color: #808080;
        font-style: italic;
      }
      
      .history-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }
      
      .history-table th,
      .history-table td {
        padding: 10px;
        text-align: left;
        border-bottom: 1px solid #d0d0d0;
      }
      
      .history-table th {
        background: #f5f5f5;
        font-weight: 600;
        color: #000000;
        font-size: 0.85em;
      }
      
      .history-table td {
        font-size: 0.9em;
        color: #333333;
      }
      
      .delete-history-btn {
        background: none;
        border: 1px solid #c0c0c0;
        color: #666666;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 0;
        font-size: 0.9em;
        transition: all 0.2s;
      }
      
      .delete-history-btn:hover {
        background: #666666;
        color: #ffffff;
        border-color: #666666;
      }
      
      @media (max-width: 768px) {
        body {
          padding: 10px;
        }
        
        .workout-container {
          grid-template-columns: 1fr;
        }
        
        .exercise-details {
          grid-template-columns: 1fr;
          gap: 8px;
        }
        
        .detail-group {
          flex-direction: row;
          justify-content: space-between;
        }
        
        .detail-input {
          width: 80px;
        }
        
        .modal-content {
          width: 95%;
          padding: 20px;
        }
        
        .bar-chart {
          height: 300px;
        }
      }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">🧠 PhD Upper Body Correction & Strength Routine</div>
        <div class="subtitle">7-Day Routine (Lower Body Excluded)</div>
        <a href="/misc" class="back-btn">← Back to MISC</a>
    </div>

    <div class="workout-container" id="workoutContainer">
        <!-- Workout days will be populated by JavaScript -->
    </div>

    <button class="settings-btn" onclick="openSettingsModal()">⚙️</button>
    <button class="sync-btn" onclick="syncWithGitHub()">🔄 Sync</button>
    <button class="save-btn" onclick="saveWorkout()">💾 Save</button>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">GitHub Sync Settings</div>
                <button class="close-btn" onclick="closeSettingsModal()">&times;</button>
            </div>
            <div id="settingsContent">
                <div class="token-input-group">
                    <label class="token-label">GitHub Personal Access Token</label>
                    <input type="password" id="githubToken" class="token-input" placeholder="ghp_...">
                    <div class="token-hint">
                        If you don't have a token, <a href="https://github.com/settings/tokens/new?scopes=repo&description=Workout%20Tracker" target="_blank">create one here</a>.
                        <br>Required scope: <strong>repo</strong>
                    </div>
                </div>
                
                <div id="syncStatus"></div>
                
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="saveGitHubToken()">Save</button>
                    <button class="btn btn-secondary" onclick="testGitHubConnection()">Test Connection</button>
                </div>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Workout History</div>
                <button class="close-btn" onclick="closeHistoryModal()">&times;</button>
            </div>
            <div id="historyContent">
                <!-- History charts will be populated here -->
            </div>
        </div>
    </div>

        // Get current day
        function getCurrentDay() {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const today = new Date();
            return days[today.getDay()];
        }

        // Load workout data from localStorage or use default
        function loadWorkoutData() {
            const saved = localStorage.getItem('workoutData');
            // Force reload default data to update to English version
            if (!localStorage.getItem('dataVersion') || localStorage.getItem('dataVersion') !== '4.0') {
                localStorage.setItem('dataVersion', '4.0');
                localStorage.removeItem('workoutData'); // Clear old data
                return defaultWorkoutData;
            }
            return saved ? JSON.parse(saved) : defaultWorkoutData;
        }

        // Load workout history
        function loadWorkoutHistory() {
            const saved = localStorage.getItem('workoutHistory');
            return saved ? JSON.parse(saved) : {};
        }

        // Save workout history
        function saveWorkoutHistory(history) {
            localStorage.setItem('workoutHistory', JSON.stringify(history));
        }

        // Delete specific history record
        function deleteHistoryRecord(exerciseName, recordIndex) {
            if (!confirm('Are you sure you want to delete this record?')) {
                return;
            }
            
            const history = loadWorkoutHistory();
            if (history[exerciseName] && history[exerciseName][recordIndex]) {
                history[exerciseName].splice(recordIndex, 1);
                
                // If no records left for this exercise, remove the exercise entry
                if (history[exerciseName].length === 0) {
                    delete history[exerciseName];
                }
                
                saveWorkoutHistory(history);
                
                // Refresh the modal
                showExerciseHistory(exerciseName);
            }
        }

        // Save completed exercise to history
        function saveExerciseToHistory(exerciseName, sets, weight, reps) {
            const history = loadWorkoutHistory();
            const date = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
            
            if (!history[exerciseName]) {
                history[exerciseName] = [];
            }
            
            // Parse weight - handle ranges like "30~40"
            let weightValue = weight;
            if (typeof weight === 'string' && weight.includes('~')) {
                const weights = weight.split('~').map(w => parseFloat(w.trim()));
                weightValue = (weights[0] + weights[1]) / 2; // Average
            } else {
                weightValue = parseFloat(weight) || 0;
            }
            
            // Parse reps - handle ranges like "10~12"
            let repsValue = reps;
            if (typeof reps === 'string' && reps.includes('~')) {
                const repsRange = reps.split('~').map(r => parseFloat(r.trim()));
                repsValue = (repsRange[0] + repsRange[1]) / 2; // Average
            } else {
                repsValue = parseFloat(reps) || 0;
            }
            
            history[exerciseName].push({
                date: date,
                sets: parseInt(sets),
                weight: weightValue,
                reps: repsValue,
                originalWeight: weight,
                originalReps: reps
            });
            
            // Keep only last 10 records per exercise
            if (history[exerciseName].length > 10) {
                history[exerciseName] = history[exerciseName].slice(-10);
            }
            
            saveWorkoutHistory(history);
        }

        // Complete exercise (save to history)
        function completeExercise(button) {
            const exerciseItem = button.closest('.exercise-item');
            const name = exerciseItem.querySelector('.exercise-name').textContent;
            const sets = exerciseItem.querySelector('[data-field="sets"]').value;
            const weight = exerciseItem.querySelector('[data-field="weight"]').value;
            const reps = exerciseItem.querySelector('[data-field="reps"]').value;
            
            saveExerciseToHistory(name, sets, weight, reps);
            
            // Visual feedback
            exerciseItem.style.background = '#f0f0f0';
            button.innerHTML = '✅ Done!';
            
            setTimeout(() => {
                exerciseItem.style.background = '#ffffff';
                button.innerHTML = '✓ Complete';
            }, 2000);
        }

        // Draw volume chart (stacked by sets and reps)
        function drawVolumeChart(containerId, data) {
            const container = document.getElementById(containerId);
            
            // Calculate total volume for each record
            const volumeData = data.map(record => {
                const weightPerRep = record.weight;
                const volumePerSet = record.weight * record.reps;
                const totalVolume = volumePerSet * record.sets;
                return {
                    date: record.date,
                    sets: record.sets,
                    reps: record.reps,
                    weight: record.weight,
                    weightPerRep: weightPerRep,
                    volumePerSet: volumePerSet,
                    totalVolume: totalVolume
                };
            });
            
            // Scale by maximum so tallest bar reaches ~90% height
            const volumes = volumeData.map(d => d.totalVolume).filter(v => isFinite(v));
            const maxVolume = Math.max(...volumes, 1);
            const scaledMax = maxVolume / 0.9;
            
            container.innerHTML = volumeData.map(record => {
                const shortDate = record.date.slice(5); // MM-DD
                
                // Create stacked bars
                let stackedBars = '';
                const baseColor = '#333333'; // Grayscale color for all sets
                
                // Calculate total height as percentage (clamped), then divide by number of reps
                const totalHeight = Math.min(100, (record.totalVolume / scaledMax) * 100);
                const heightPerRep = totalHeight / (record.sets * record.reps);
                
                // Build bars for each set
                for (let setNum = 0; setNum < record.sets; setNum++) {
                    // Each set contains multiple reps
                    for (let repNum = 0; repNum < record.reps; repNum++) {
                        const isLastRepInSet = repNum === record.reps - 1;
                        const isFirstRepInSet = repNum === 0;
                        const isTopOfBar = setNum === record.sets - 1 && isLastRepInSet;
                        
                        // Lighter shade for alternating reps within a set
                        const shade = repNum % 2 === 0 ? baseColor : '#555555';
                        
                        // Border styling
                        let borderTop = 'none';
                        let borderBottom = 'none';
                        let borderRadius = '0';
                        
                        if (isTopOfBar) {
                            borderRadius = '4px 4px 0 0';
                        }
                        
                        if (isLastRepInSet && !isTopOfBar) {
                            borderBottom = '3px solid #000000'; // Thick border between sets
                        } else if (!isLastRepInSet) {
                            borderBottom = '1px solid rgba(255,255,255,0.3)'; // Thin border between reps
                        }
                        
                        stackedBars += `<div class="bar-stack" style="height: ${heightPerRep}%; background: ${shade}; width: 100%; border-radius: ${borderRadius}; box-sizing: border-box; border-bottom: ${borderBottom};"></div>`;
                    }
                }
                
                return `
                    <div class="bar-group">
                        <div style="display: flex; flex-direction: column; justify-content: flex-end; height: 100%; width: 100%; position: relative;">
                            <div class="bar-value" style="position: absolute; top: -25px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-weight: 700; color: #000000;">${record.totalVolume}kg</div>
                            ${stackedBars}
                        </div>
                        <div class="bar-label">${shortDate}</div>
                        <div style="font-size: 0.7em; color: #666666; text-align: center; margin-top: 2px;">${record.sets} sets × ${record.reps} reps</div>
                    </div>
                `;
            }).join('');
        }

        // Show day history (all exercises for a specific day)
        function showDayHistory(dayName) {
            const history = loadWorkoutHistory();
            const workoutData = loadWorkoutData();
            const dayExercises = workoutData[dayName]?.exercises || [];
            
            // Get all exercise names for this day
            const exerciseNames = dayExercises.map(ex => ex.name);
            
            // Collect all dates when any exercise from this day was performed
            const dateMap = {}; // date -> { exerciseName -> record }
            
            exerciseNames.forEach(exerciseName => {
                const exerciseHistory = history[exerciseName] || [];
                exerciseHistory.forEach(record => {
                    if (!dateMap[record.date]) {
                        dateMap[record.date] = {};
                    }
                    dateMap[record.date][exerciseName] = record;
                });
            });
            
            // Convert to array and sort by date
            const sortedDates = Object.keys(dateMap).sort();
            
            const modal = document.getElementById('historyModal');
            const modalTitle = document.getElementById('modalTitle');
            const historyContent = document.getElementById('historyContent');
            
            modalTitle.textContent = `${dayName} - Total Volume History`;
            
            if (sortedDates.length === 0) {
                historyContent.innerHTML = '<div class="no-history">No workout records yet.<br>Press the Complete button to start tracking!</div>';
            } else {
                // Generate colors for each exercise (grayscale palette)
                const colors = [
                    '#000000', '#333333', '#4d4d4d', '#666666', '#808080',
                    '#999999', '#b3b3b3', '#1a1a1a', '#404040', '#595959'
                ];
                const exerciseColors = {};
                exerciseNames.forEach((name, index) => {
                    exerciseColors[name] = colors[index % colors.length];
                });
                
                // Calculate data for chart
                const chartData = sortedDates.map(date => {
                    const dayData = dateMap[date];
                    let totalVolume = 0;
                    const exerciseVolumes = {};
                    
                    exerciseNames.forEach(exerciseName => {
                        const record = dayData[exerciseName];
                        if (record) {
                            const volume = record.sets * record.weight * record.reps;
                            exerciseVolumes[exerciseName] = volume;
                            totalVolume += volume;
                        } else {
                            exerciseVolumes[exerciseName] = 0;
                        }
                    });
                    
                    return {
                        date,
                        totalVolume,
                        exerciseVolumes
                    };
                });
                
                // Scale by maximum so tallest bar reaches ~90% height
                const totals = chartData.map(d => d.totalVolume).filter(v => isFinite(v));
                const maxTotal = Math.max(...totals, 1);
                const scaledMax = maxTotal / 0.9;
                
                historyContent.innerHTML = `
                    <div class="chart-section">
                        <div class="chart-section-title">Total Volume Trend (Stacked by Exercise)</div>
                        <div class="bar-chart" id="dayVolumeChart" style="height: 400px;"></div>
                    </div>
                    
                    <div class="chart-section">
                        <div class="chart-section-title">Exercise Color Legend</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
                            ${exerciseNames.map(name => `
                                <div style="display: flex; align-items: center; gap: 5px;">
                                    <div style="width: 20px; height: 20px; background: ${exerciseColors[name]}; border-radius: 4px;"></div>
                                    <span style="font-size: 0.85em;">${name}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="chart-section">
                        <div class="chart-section-title">Detailed Records</div>
                        <table class="history-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    ${exerciseNames.map(name => `<th>${name}<br>(kg)</th>`).join('')}
                                    <th>Total Volume (kg)</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${chartData.slice().reverse().map(data => `
                                    <tr>
                                        <td>${data.date}</td>
                                        ${exerciseNames.map(name => {
                                            const volume = data.exerciseVolumes[name];
                                            return `<td style="color: ${exerciseColors[name]}; font-weight: ${volume > 0 ? 'bold' : 'normal'};">${volume > 0 ? volume.toFixed(0) : '-'}</td>`;
                                        }).join('')}
                                        <td><strong>${data.totalVolume.toFixed(0)}</strong></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                
                // Draw stacked bar chart
                const container = document.getElementById('dayVolumeChart');
                container.innerHTML = chartData.map(data => {
                    const shortDate = data.date.slice(5); // MM-DD
                    
                    // Build stacked bars for each exercise
                    let stackedBars = '';
                    
                    exerciseNames.forEach(exerciseName => {
                        const volume = data.exerciseVolumes[exerciseName];
                        if (volume > 0) {
                            const heightPercent = Math.min(100, (volume / scaledMax) * 100);
                            const color = exerciseColors[exerciseName];
                            stackedBars += `<div class="bar-stack" style="height: ${heightPercent}%; background: ${color}; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.3); box-sizing: border-box;" title="${exerciseName}: ${volume.toFixed(0)}kg"></div>`;
                        }
                    });
                    
                    return `
                        <div class="bar-group">
                            <div style="display: flex; flex-direction: column-reverse; justify-content: flex-start; height: 100%; width: 100%; position: relative;">
                                <div class="bar-value" style="position: absolute; top: -25px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-weight: 700; color: #000000;">${data.totalVolume.toFixed(0)}kg</div>
                                ${stackedBars}
                            </div>
                            <div class="bar-label">${shortDate}</div>

                }).join('');
            }
            
            modal.classList.add('show');
        }

        // Save workout data to localStorage
        function saveWorkout() {
            const workoutData = {};
            const dayCards = document.querySelectorAll('.day-card');
            
            dayCards.forEach(card => {
                const dayTitleLeft = card.querySelector('.day-title-left');
                const dayName = dayTitleLeft.textContent.replace(' TODAY', '').trim();
                const focus = card.querySelector('.day-focus').textContent;
                const exercises = [];
                
                const exerciseItems = card.querySelectorAll('.exercise-item');
                exerciseItems.forEach(item => {
                    const name = item.querySelector('.exercise-name').textContent;
                    const sets = parseInt(item.querySelector('[data-field="sets"]').value);
                    const weight = item.querySelector('[data-field="weight"]').value;
                    const reps = item.querySelector('[data-field="reps"]').value;
                    const effect = item.querySelector('.exercise-effect').textContent;
                    
                    exercises.push({ name, sets, weight, reps, effect });
                });
                
                workoutData[dayName] = { focus, exercises };
            });
            
            localStorage.setItem('workoutData', JSON.stringify(workoutData));
            
            // Show save confirmation
            const btn = document.querySelector('.save-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✅ Saved!';
            btn.style.background = '#ffffff';
            btn.style.color = '#000000';
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '#000000';
                btn.style.color = '#ffffff';
            }, 2000);
        }

        // Edit exercise name
        function editExerciseName(element) {
            const currentName = element.textContent;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'exercise-name-input';
            input.value = currentName;
            
            element.parentNode.replaceChild(input, element);
            input.focus();
            input.select();
            
            function finishEdit() {
                const newName = input.value.trim() || currentName;
                const newDiv = document.createElement('div');
                newDiv.className = 'exercise-name';
                newDiv.textContent = newName;
                newDiv.onclick = () => editExerciseName(newDiv);
                
                input.parentNode.replaceChild(newDiv, input);
                
                // Update the data-exercise-name attribute on the history button
                const exerciseItem = newDiv.closest('.exercise-item');
                if (exerciseItem) {
                    const historyBtn = exerciseItem.querySelector('.history-btn');
                    if (historyBtn) {
                        historyBtn.setAttribute('data-exercise-name', newName);
                    }
                }
                
                saveWorkout();
            }
            
            input.addEventListener('blur', finishEdit);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    finishEdit();
                }
            });
        }

        // Edit exercise effect
        function editExerciseEffect(element) {
            const currentEffect = element.textContent;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'exercise-effect-input';
            input.value = currentEffect;
            
            element.parentNode.replaceChild(input, element);
            input.focus();
            input.select();
            
            function finishEdit() {
                const newEffect = input.value.trim() || currentEffect;
                const newDiv = document.createElement('div');
                newDiv.className = 'exercise-effect';
                newDiv.textContent = newEffect;
                newDiv.onclick = () => editExerciseEffect(newDiv);
                
                input.parentNode.replaceChild(newDiv, input);
                saveWorkout();
            }
            
            input.addEventListener('blur', finishEdit);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    finishEdit();
                }
            });
        }

        }

        // Delete exercise
        function deleteExercise(button) {
            if (confirm('Are you sure you want to delete this exercise?')) {
                const exerciseItem = button.closest('.exercise-item');
                exerciseItem.remove();
                saveWorkout();
            }
        }

        // Auto-save on input change
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('detail-input') || 
                e.target.classList.contains('exercise-name-input') || 
                e.target.classList.contains('exercise-effect-input')) {
                // Auto-save after 1 second of no typing
                clearTimeout(window.autoSaveTimeout);
                window.autoSaveTimeout = setTimeout(saveWorkout, 1000);
            }
        });

        // ==================== GitHub API Functions ====================
        
        // Get GitHub token
        function getGitHubToken() {
            return localStorage.getItem('githubToken');
        }
        
        // Save GitHub token
        function saveGitHubToken() {
            const token = document.getElementById('githubToken').value.trim();
            if (!token) {
                showSyncStatus('Please enter a token.', 'error');
                return;
            }
            localStorage.setItem('githubToken', token);
            showSyncStatus('Token saved successfully.', 'success');
        }
        
        // Test GitHub connection
        async function testGitHubConnection() {
            const token = getGitHubToken();
            if (!token) {
                showSyncStatus('Please save a token first.', 'error');
                return;
            }
            
            showSyncStatus('Testing connection...', 'info');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}`, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (response.ok) {
                    showSyncStatus('✅ GitHub connection successful!', 'success');
                } else {
                    showSyncStatus('❌ Connection failed: Please check your token.', 'error');
                }
            } catch (error) {
                showSyncStatus('❌ Network error: ' + error.message, 'error');
            }
        }
        
        // Show sync status message
        function showSyncStatus(message, type) {
            const statusDiv = document.getElementById('syncStatus');
            statusDiv.className = `sync-status ${type}`;
            statusDiv.textContent = message;
            
            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    statusDiv.className = 'sync-status';
                    statusDiv.textContent = '';
                }, 3000);
            }
        }
        
        // Get file from GitHub
        async function getGitHubFile(path) {
            const token = getGitHubToken();
            if (!token) {
                throw new Error('GitHub token not configured.');
            }
            
            const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${path}?ref=${GITHUB_CONFIG.branch}`;
            
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            if (!response.ok) {
                if (response.status === 404) {
                    return null; // File doesn't exist
                }
                throw new Error(`GitHub API error: ${response.status}`);
            }
            
            const data = await response.json();
            const content = atob(data.content);
            return {
                content: JSON.parse(content),
                sha: data.sha
            };
        }
        
        // Update file on GitHub
        async function updateGitHubFile(path, content, sha) {
            const token = getGitHubToken();
            if (!token) {
                throw new Error('GitHub token not configured.');
            }
            
            const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${path}`;
            
            const payload = {
                message: `Update ${path}`,
                content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                branch: GITHUB_CONFIG.branch
            };
            
            if (sha) {
                payload.sha = sha;
            }
            
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(`GitHub API error: ${error.message}`);
            }
            
            return await response.json();
        }
        
        // Sync with GitHub
        async function syncWithGitHub() {
            const token = getGitHubToken();
            if (!token) {
                alert('Please enter your GitHub token in Settings (⚙️) first.');
                openSettingsModal();
                return;
            }
            
            const syncBtn = document.querySelector('.sync-btn');
            syncBtn.classList.add('syncing');
            syncBtn.innerHTML = '🔄 Syncing...';
            syncBtn.disabled = true;
            
            try {
                // Load current data from GitHub
                const workoutFile = await getGitHubFile(GITHUB_CONFIG.workoutDataPath);
                const historyFile = await getGitHubFile(GITHUB_CONFIG.workoutHistoryPath);
                
                // Get local data
                const localWorkout = loadWorkoutData();
                const localHistory = loadWorkoutHistory();
                
                // Merge and update
                let needsUpdate = false;
                
                // Update workout data to GitHub
                const workoutDataStr = JSON.stringify(localWorkout);
                const githubWorkoutStr = workoutFile ? JSON.stringify(workoutFile.content) : '';
                
                if (workoutDataStr !== githubWorkoutStr) {
                    await updateGitHubFile(
                        GITHUB_CONFIG.workoutDataPath,
                        localWorkout,
                        workoutFile ? workoutFile.sha : null
                    );
                    needsUpdate = true;
                }
                
                // Update history to GitHub
                const historyDataStr = JSON.stringify(localHistory);
                const githubHistoryStr = historyFile ? JSON.stringify(historyFile.content) : '';
                
                if (historyDataStr !== githubHistoryStr) {
                    await updateGitHubFile(
                        GITHUB_CONFIG.workoutHistoryPath,
                        localHistory,
                        historyFile ? historyFile.sha : null
                    );
                    needsUpdate = true;
                }
                
                if (needsUpdate) {
                    syncBtn.innerHTML = '✅ Synced!';
                    setTimeout(() => {
                        syncBtn.innerHTML = '🔄 Sync';
                        syncBtn.classList.remove('syncing');
                        syncBtn.disabled = false;
                    }, 2000);
                } else {
                    syncBtn.innerHTML = '✅ Already up to date!';
                    setTimeout(() => {
                        syncBtn.innerHTML = '🔄 Sync';
                        syncBtn.classList.remove('syncing');
                        syncBtn.disabled = false;
                    }, 2000);
                }
                
            } catch (error) {
                console.error('Sync error:', error);
                syncBtn.innerHTML = '❌ Sync failed';
                alert('Sync failed: ' + error.message);
                setTimeout(() => {
                    syncBtn.innerHTML = '🔄 Sync';
                    syncBtn.classList.remove('syncing');
                    syncBtn.disabled = false;
                }, 2000);
            }
        }
        
        // Load data from GitHub on startup
        async function loadFromGitHub() {
            const token = getGitHubToken();
            if (!token) {
                renderWorkout(); // No token, render local storage
                return;
            }
            
            try {
                // Load workout data
                const workoutFile = await getGitHubFile(GITHUB_CONFIG.workoutDataPath);
                if (workoutFile && workoutFile.content) {
                    localStorage.setItem('workoutData', JSON.stringify(workoutFile.content));
                }
                
                // Load history
                const historyFile = await getGitHubFile(GITHUB_CONFIG.workoutHistoryPath);
                if (historyFile && historyFile.content) {
                    localStorage.setItem('workoutHistory', JSON.stringify(historyFile.content));
                }
                
                // Re-render with GitHub data
                renderWorkout();
            } catch (error) {
                console.error('Error loading from GitHub:', error);
                // Continue with local data
                renderWorkout();
            }
        }
        
        // Open settings modal
        function openSettingsModal() {
            const modal = document.getElementById('settingsModal');
            const tokenInput = document.getElementById('githubToken');
            const savedToken = getGitHubToken();
            
            if (savedToken) {
                tokenInput.value = savedToken;
            }
            
            modal.classList.add('show');
        }
        
        // Close settings modal
        function closeSettingsModal() {
            const modal = document.getElementById('settingsModal');
            modal.classList.remove('show');
        }

        // ==================== End GitHub API Functions ====================

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            // Try to load from GitHub if token exists, otherwise render local data
            await loadFromGitHub();
        });
    </script>
</body>
</html>
