        // Double Pendulum (이중진자) Animation
        class DoublePendulum {
          constructor(canvas) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.width = canvas.width;
            this.height = canvas.height;
            
            // Capture the exact moment the website was opened
            this.openTime = new Date();
            this.openHours = this.openTime.getHours();
            this.openMinutes = this.openTime.getMinutes();
            this.openSeconds = this.openTime.getSeconds();
            this.openDay = this.openTime.getDate();
            this.openMonth = this.openTime.getMonth() + 1; // 0-indexed
            this.openYear = this.openTime.getFullYear();
            
            // Create highly sensitive fingerprint using milliseconds
            this.milliseconds = this.openTime.getMilliseconds();
            this.timeSeed = this.openHours * 3600000 + this.openMinutes * 60000 + this.openSeconds * 1000 + this.milliseconds;
            this.dateSeed = this.openYear * 10000 + this.openMonth * 100 + this.openDay;
            
            // Pendulum parameters - HIGHLY sensitive to opening time
            this.g = 0.5 + (this.timeSeed % 10000) / 10000 * 1.5; // Gravity varies dramatically (0.5-2.0)
            this.dt = 0.1 + (this.timeSeed % 5000) / 5000 * 0.05; // Time step varies dramatically (0.1-0.15)
            
            // Pendulum 1 - HIGHLY sensitive to opening time
            this.l1 = 80 + (this.timeSeed % 10000) / 10000 * 20; // Length varies dramatically (80-100px)
            this.m1 = 0.5 + (this.timeSeed % 8000) / 8000 * 1.0; // Mass varies dramatically (0.5-1.5)
            this.theta1 = Math.PI / 2 + (this.timeSeed % 10000) / 10000 * Math.PI; // Initial angle varies dramatically
            this.omega1 = (this.timeSeed % 10000 - 5000) / 5000 * 0.1; // Initial velocity reduced (0.1 instead of 0.5)
            
            // Pendulum 2 - HIGHLY sensitive to opening date + time
            this.l2 = 80 + ((this.dateSeed + this.timeSeed) % 10000) / 10000 * 20; // Length varies dramatically (80-100px)
            this.m2 = 0.5 + ((this.dateSeed + this.timeSeed) % 8000) / 8000 * 1.0; // Mass varies dramatically (0.5-1.5)
            this.theta2 = Math.PI / 2 + ((this.dateSeed + this.timeSeed) % 10000) / 10000 * Math.PI; // Initial angle varies dramatically
            this.omega2 = ((this.dateSeed + this.timeSeed) % 10000 - 5000) / 5000 * 0.1; // Initial velocity reduced (0.1 instead of 0.5)
            
            // Trail for second pendulum
            this.trail = [];
            this.maxTrailLength = 5000; // Very long trail
            
            // Center point - perfectly centered to avoid any cutoff
            this.centerX = this.width / 2;
            this.centerY = this.height / 2;
          }
          
          update() {
            // Double pendulum physics equations
            const num1 = -this.g * (2 * this.m1 + this.m2) * Math.sin(this.theta1);
            const num2 = -this.m2 * this.g * Math.sin(this.theta1 - 2 * this.theta2);
            const num3 = -2 * Math.sin(this.theta1 - this.theta2) * this.m2;
            const num4 = this.omega2 * this.omega2 * this.l2 + this.omega1 * this.omega1 * this.l1 * Math.cos(this.theta1 - this.theta2);
            const den = this.l1 * (2 * this.m1 + this.m2 - this.m2 * Math.cos(2 * this.theta1 - 2 * this.theta2));
            
            const alpha1 = (num1 + num2 + num3 * num4) / den;
            
            const num5 = 2 * Math.sin(this.theta1 - this.theta2);
            const num6 = this.omega1 * this.omega1 * this.l1 * (this.m1 + this.m2);
            const num7 = this.g * (this.m1 + this.m2) * Math.cos(this.theta1);
            const num8 = this.omega2 * this.omega2 * this.l2 * this.m2 * Math.cos(this.theta1 - this.theta2);
            const den2 = this.l2 * (2 * this.m1 + this.m2 - this.m2 * Math.cos(2 * this.theta1 - 2 * this.theta2));
            
            const alpha2 = (num5 * (num6 + num7 + num8)) / den2;
            
            // Update velocities and angles
            this.omega1 += alpha1 * this.dt;
            this.omega2 += alpha2 * this.dt;
            this.theta1 += this.omega1 * this.dt;
            this.theta2 += this.omega2 * this.dt;
            
            // Calculate positions
            const x1 = this.centerX + this.l1 * Math.sin(this.theta1);
            const y1 = this.centerY + this.l1 * Math.cos(this.theta1);
            const x2 = x1 + this.l2 * Math.sin(this.theta2);
            const y2 = y1 + this.l2 * Math.cos(this.theta2);
            
            // Add to trail
            this.trail.push({x: x2, y: y2});
            if (this.trail.length > this.maxTrailLength) {
              this.trail.shift();
            }
          }
          
          draw() {
            // Clear canvas
            this.ctx.fillStyle = "#fff";
            this.ctx.fillRect(0, 0, this.width, this.height);
            
            // Calculate positions
            const x1 = this.centerX + this.l1 * Math.sin(this.theta1);
            const y1 = this.centerY + this.l1 * Math.cos(this.theta1);
            const x2 = x1 + this.l2 * Math.sin(this.theta2);
            const y2 = y1 + this.l2 * Math.cos(this.theta2);
            
            // Draw trail (permanent, no fading)
            this.ctx.strokeStyle = "rgba(0, 0, 0, 0.3)";
            this.ctx.lineWidth = 1;
            this.ctx.beginPath();
            for (let i = 1; i < this.trail.length; i++) {
              this.ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
              this.ctx.lineTo(this.trail[i].x, this.trail[i].y);
            }
            this.ctx.stroke();
            
            // Draw pendulum rods
            this.ctx.strokeStyle = "#000";
            this.ctx.lineWidth = 2;
            this.ctx.beginPath();
            this.ctx.moveTo(this.centerX, this.centerY);
            this.ctx.lineTo(x1, y1);
            this.ctx.moveTo(x1, y1);
            this.ctx.lineTo(x2, y2);
            this.ctx.stroke();
            
            // Draw pivot point
            this.ctx.fillStyle = "#000";
            this.ctx.beginPath();
            this.ctx.arc(this.centerX, this.centerY, 4, 0, 2 * Math.PI);
            this.ctx.fill();
            
            // Draw first pendulum bob
            this.ctx.fillStyle = "#333";
            this.ctx.beginPath();
            this.ctx.arc(x1, y1, 6, 0, 2 * Math.PI);
            this.ctx.fill();
            
            // Draw second pendulum bob
            this.ctx.fillStyle = "#666";
            this.ctx.beginPath();
            this.ctx.arc(x2, y2, 6, 0, 2 * Math.PI);
            this.ctx.fill();
          }
          
          animate() {
            this.update();
            this.draw();
            requestAnimationFrame(() => this.animate());
          }
        }
        
        // Initialize and start animation
        function initDoublePendulum() {
          const canvas = document.getElementById('worm-canvas');
          const pendulum = new DoublePendulum(canvas);
          pendulum.animate();
        }
        
        // Handle resize
        function resizeCanvas() {
          const canvas = document.getElementById('worm-canvas');
          let size;
          if (window.innerWidth <= 600) {
            size = Math.max(20, Math.floor(window.innerWidth - 8));
          } else {
            size = Math.min(400, Math.floor(window.innerWidth * 0.95));
          }
          canvas.width = size;
          canvas.height = size;
        }
        
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', () => {
          resizeCanvas();
          initDoublePendulum();
        });
