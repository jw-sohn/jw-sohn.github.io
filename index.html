      <script>
        // Simple seeded random number generator (mulberry32)
        function mulberry32(seed) {
          return function() {
            var t = seed += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
          }
        }

        // Get a seed based on the current time, down to the second
        function getCurrentSeed() {
          const now = new Date();
          return now.getFullYear() * 10000000000 +
                 (now.getMonth()+1) * 100000000 +
                 now.getDate() * 1000000 +
                 now.getHours() * 10000 +
                 now.getMinutes() * 100 +
                 Math.floor(now.getSeconds() / 5);
        }

        let rand = mulberry32(getCurrentSeed());

        function drawWorm(canvas) {
          const ctx = canvas.getContext('2d');
          const w = canvas.width;
          const h = canvas.height;
          ctx.clearRect(0, 0, w, h);

          // Background: white
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, w, h);

          // Worm parameters (narrower lines)
          const steps = 600 + Math.floor(rand() * 400);
          const wormLength = 60 + Math.floor(rand() * 40);
          const wormRadius = 2.2 + rand() * 0.8; 
          let x = w/2 + (rand()-0.5)*w*0.2;
          let y = h/2 + (rand()-0.5)*h*0.2;
          let angle = rand() * Math.PI * 2;

          // Store worm segments for trailing effect
          let segments = [];

          for (let i = 0; i < steps; ++i) {
            // Black for head, trailing segments fade to gray
            let baseAlpha = 0.95;
            ctx.fillStyle = `rgba(0,0,0,${baseAlpha})`;

            // Draw segment (head)
            ctx.beginPath();
            ctx.arc(x, y, wormRadius, 0, 2*Math.PI);
            ctx.fill();

            // Store segment for trailing
            segments.push({x, y});

            // Remove oldest segment if too long
            if (segments.length > wormLength) segments.shift();

            // Draw trailing effect (fainter, grayscale)
            for (let j = 0; j < segments.length; ++j) {
              let seg = segments[j];
              // Fade from black to light gray
              let alpha = 0.08 + 0.25 * (j / wormLength);
              ctx.beginPath();
              ctx.arc(seg.x, seg.y, wormRadius*0.7, 0, 2*Math.PI);
              ctx.fillStyle = `rgba(0,0,0,${alpha})`;
              ctx.fill();
            }

            // Move worm
            angle += (rand()-0.5)*0.7; // random turn
            let speed = 2.2 + rand()*1.2;
            x += Math.cos(angle) * speed;
            y += Math.sin(angle) * speed;

            // Bounce off edges
            if (x < wormRadius) { x = wormRadius; angle = Math.PI - angle; }
            if (x > w-wormRadius) { x = w-wormRadius; angle = Math.PI - angle; }
            if (y < wormRadius) { y = wormRadius; angle = -angle; }
            if (y > h-wormRadius) { y = h-wormRadius; angle = -angle; }
          }
        }

        // Responsive canvas sizing and redraw every second
        function resizeAndDrawWorm() {
          const canvas = document.getElementById('worm-canvas');
          // On mobile, fill width minus 8px (4px margin each side), else max 400px
          let size;
          if (window.innerWidth <= 600) {
            size = Math.max(20, Math.floor(window.innerWidth - 8));
          } else {
            size = Math.min(400, Math.floor(window.innerWidth * 0.95));
          }
          canvas.width = size;
          canvas.height = size;
          rand = mulberry32(getCurrentSeed());
          drawWorm(canvas);
        }

        window.addEventListener('resize', resizeAndDrawWorm);
        window.addEventListener('DOMContentLoaded', () => {
          resizeAndDrawWorm();
          setInterval(resizeAndDrawWorm, 1000);
        });
      </script>
